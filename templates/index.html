<!DOCTYPE html>
<html>
<head>
    <title>CSAO Recommendation System</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px #667eea;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #5641c5;
            transform: scale(1.05);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f1f1f1;
            margin: 5px 0;
            padding: 8px;
            border-radius: 6px;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🛒 Intelligent Add-On</h2>

    <form method="POST" onsubmit="showLoading()">
        <input type="text" name="cart" placeholder="Enter cart items (e.g. Biryani)" required><br>

        <select name="time">
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>
        </select><br>

        <button type="submit">Get Recommendations</button>
    </form>

    <div id="loading" style="display:none; margin-top:10px;">
        ⏳ Finding best add-ons...
    </div>

    {% if recommendations %}
        <h3>✨ Recommended Add-ons:</h3>
        <ul>
            {% for item in recommendations %}
                <li>{{ item }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</div>

<script>
function showLoading() {
    document.getElementById("loading").style.display = "block";
}
</script>

</body>
</html>
